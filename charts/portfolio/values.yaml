# Default values for the portfolio chart.
replicaCount: 1

image:
  repository: petarpdev/devops-portfolio
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: traefik
  host: portfolio.localhost

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"