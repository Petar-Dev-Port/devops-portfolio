name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Build application
      working-directory: ./frontend
      run: npm run build
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker image
      working-directory: ./frontend
      run: |
        docker build -t petarpdev/devops-portfolio:prod-${{ github.sha }} -t petarpdev/devops-portfolio:latest .
        docker push petarpdev/devops-portfolio:prod-${{ github.sha }}
        docker push petarpdev/devops-portfolio:latest
        
    - name: Production deployment complete
      run: |
        echo "🚀 Production deployment complete!"
        echo "📦 Image: petarpdev/devops-portfolio:prod-${{ github.sha }}"
        echo "🏷️ Also tagged as: petarpdev/devops-portfolio:latest"
        echo "🔗 Docker Hub: https://hub.docker.com/r/petarpdev/devops-portfolio"
