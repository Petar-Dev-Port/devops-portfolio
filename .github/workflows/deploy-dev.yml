name: Deploy to Dev
on:
  push:
    branches:
      - dev
permissions:
  contents: write
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    - name: Build application
      working-directory: ./frontend
      run: npm run build
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push Docker image
      working-directory: ./frontend
      run: |
        docker build -t petarpdev/devops-portfolio:dev-${{ github.sha }} -t petarpdev/devops-portfolio:dev-latest .
        docker push petarpdev/devops-portfolio:dev-${{ github.sha }}
        docker push petarpdev/devops-portfolio:dev-latest
    - name: Update manifest with new image tag (GitOps commit-back)
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        sed -i "s|image: petarpdev/devops-portfolio:.*|image: petarpdev/devops-portfolio:dev-${{ github.sha }}|" infrastructure/kubernetes/dev/deployment.yaml
        git add infrastructure/kubernetes/dev/deployment.yaml
        git commit -m "ci: set dev image to dev-${{ github.sha }} [skip ci]" || echo "No change to commit"
        git push origin HEAD:dev