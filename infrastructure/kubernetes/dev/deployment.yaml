apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-dev
  namespace: default
  labels:
    app: portfolio
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
      env: dev
  template:
    metadata:
      labels:
        app: portfolio
        env: dev
    spec:
      containers:
      - name: portfolio
        image: petarpdev/devops-portfolio:dev-f0391bac213e4b7b948ffee8507521cb6831432c
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
